<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body>
<h1>API Debug</h1>
<div id="axios-result">Loading via axios...</div>
<div id="fetch-result">Loading via fetch...</div>
<script type="module">
  import axios from '/node_modules/.vite/deps/axios.js';
  const instance = axios.create({ baseURL: '' });
  instance.interceptors.response.use(r => r.data, e => Promise.reject(e));
  
  instance.get('/api/experiments')
    .then(data => {
      document.getElementById('axios-result').textContent = 
        'Axios OK: code=' + data.code + ', count=' + (data.data?.length || 0);
    })
    .catch(e => {
      document.getElementById('axios-result').textContent = 'Axios Error: ' + e.message;
    });
  
  fetch('/api/experiments')
    .then(r => r.json())
    .then(data => {
      document.getElementById('fetch-result').textContent = 
        'Fetch OK: code=' + data.code + ', count=' + (data.data?.length || 0);
    })
    .catch(e => {
      document.getElementById('fetch-result').textContent = 'Fetch Error: ' + e.message;
    });
</script>
</body>
</html>
